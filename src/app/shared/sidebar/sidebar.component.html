<div class="h-screen w-60 flex flex-col fixed left-0 top-0" style="background-color: #1E293B;">

  <!-- Logo -->
<div class="px-6 py-5" style="border-bottom: 1px solid #334155;">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background-color: #2563EB;">
      <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
    </div>
    <div>
      <h1 class="text-sm font-bold text-white">Matricula<span style="color: #10B981;">+</span></h1>
      <p class="text-xs" style="color: #64748B;">Gestión Académica</p>
    </div>
  </div>
</div>

  <!-- Usuario -->
  <div class="px-4 py-4" style="border-bottom: 1px solid #334155;">
    <div class="flex items-center gap-3 rounded-xl px-3 py-2" style="background-color: #0F172A;">
      <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background-color: #1D4ED8;">
        <span class="text-white text-xs font-bold">
          {{ authService.currentUser()?.sub?.charAt(0)?.toUpperCase() }}
        </span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-semibold text-white truncate">{{ authService.currentUser()?.sub }}</p>
        <p class="text-xs" style="color: #64748B;">Administrador</p>
      </div>
    </div>
  </div>

  <!-- Navegación -->
  <nav class="flex-1 px-3 py-4 space-y-1">
    <p class="text-xs font-semibold uppercase tracking-wider px-3 mb-2" style="color: #475569;">Principal</p>

    <a routerLink="/admin/dashboard" routerLinkActive="active-link"
       class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-150 cursor-pointer"
       style="color: #94A3B8;">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="text-sm font-medium">Dashboard</span>
    </a>

    <p class="text-xs font-semibold uppercase tracking-wider px-3 mt-4 mb-2" style="color: #475569;">Gestión</p>

    <a routerLink="/admin/slots" routerLinkActive="active-link"
       class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-150 cursor-pointer"
       style="color: #94A3B8;">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <span class="text-sm font-medium">Slots</span>
    </a>

    <a routerLink="/admin/appointments" routerLinkActive="active-link"
       class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-150 cursor-pointer"
       style="color: #94A3B8;">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <span class="text-sm font-medium">Citas</span>
    </a>

    <a routerLink="/admin/students" routerLinkActive="active-link"
       class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-150 cursor-pointer"
       style="color: #94A3B8;">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
      </svg>
      <span class="text-sm font-medium">Estudiantes</span>
    </a>
  </nav>

  <!-- Logout -->
  <div class="px-3 py-4" style="border-top: 1px solid #334155;">
    <button (click)="logout()"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-150"
            style="color: #64748B;"
            onmouseover="this.style.backgroundColor='#450a0a'; this.style.color='#f87171'"
            onmouseout="this.style.backgroundColor='transparent'; this.style.color='#64748B'">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      <span class="text-sm font-medium">Cerrar sesión</span>
    </button>
  </div>
</div>
