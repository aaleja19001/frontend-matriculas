<div class="h-screen w-64 flex flex-col fixed left-0 top-0 bg-[#0F172A] border-r border-slate-800 shadow-2xl z-50">

  <!-- Logo Section -->
  <div class="px-7 py-8">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center bg-blue-600 shadow-lg shadow-blue-900/20">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
      <div class="leading-tight">
        <h1 class="text-lg font-black text-white tracking-tight" style="font-family: 'DM Mono', monospace;">
          Matricula<span class="text-emerald-400">+</span>
        </h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Administrador</p>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 py-4 space-y-1.5 overflow-y-auto custom-scrollbar">
    
    <div class="mb-6">
      <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.15em] mb-4">Principal</p>
      
      <a routerLink="/admin/dashboard" routerLinkActive="active-link"
         class="nav-item group flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-slate-800/50">
        <div class="nav-indicator absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full opacity-0 transition-all"></div>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-sm font-semibold tracking-wide">Dashboard</span>
      </a>
    </div>

    <div>
      <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.15em] mb-4">Gestión Académica</p>
      
      <a routerLink="/admin/slots" routerLinkActive="active-link"
         class="nav-item group flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-slate-800/50">
        <div class="nav-indicator absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full opacity-0 transition-all"></div>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span class="text-sm font-semibold tracking-wide">Horarios</span>
      </a>

      <a routerLink="/admin/appointments" routerLinkActive="active-link"
         class="nav-item group flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-slate-800/50 relative">
        <div class="nav-indicator absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full opacity-0 transition-all"></div>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <span class="text-sm font-semibold tracking-wide">Citas</span>
        <span *ngIf="pendingCount() > 0" 
              class="absolute right-4 px-2 py-0.5 rounded-full bg-rose-500 text-[10px] font-black text-white shadow-lg shadow-rose-900/40 animate-pulse">
          {{ pendingCount() }}
        </span>
      </a>

      <a routerLink="/admin/students" routerLinkActive="active-link"
         class="nav-item group flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-slate-800/50">
        <div class="nav-indicator absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full opacity-0 transition-all"></div>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <span class="text-sm font-semibold tracking-wide">Estudiantes</span>
      </a>

      <a routerLink="/admin/professors" routerLinkActive="active-link"
         class="nav-item group flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-slate-800/50">
        <div class="nav-indicator absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full opacity-0 transition-all"></div>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        <span class="text-sm font-semibold tracking-wide">Profesores</span>
      </a>

      <!-- Usuarios moved to Configuración -->

      <a routerLink="/admin/offerings" routerLinkActive="active-link"
         class="nav-item group flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-slate-800/50">
        <div class="nav-indicator absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full opacity-0 transition-all"></div>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-sm font-semibold tracking-wide">Ofertas</span>
      </a>
    </div>

    <div class="pt-4 border-t border-slate-800/50 mt-4">
      <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.15em] mb-4">Configuración</p>
      
      <a routerLink="/admin/programs" routerLinkActive="active-link"
         class="nav-item group flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-slate-800/50">
        <div class="nav-indicator absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full opacity-0 transition-all"></div>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        <span class="text-sm font-semibold tracking-wide">Programas</span>
      </a>

      <a routerLink="/admin/users" routerLinkActive="active-link"
         class="nav-item group flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-slate-800/50">
        <div class="nav-indicator absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full opacity-0 transition-all"></div>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5v14"/>
        </svg>
        <span class="text-sm font-semibold tracking-wide">Usuarios</span>
      </a>

      <a routerLink="/admin/subjects" routerLinkActive="active-link"
         class="nav-item group flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-400 hover:text-white hover:bg-slate-800/50">
        <div class="nav-indicator absolute left-0 w-1 h-6 bg-blue-500 rounded-r-full opacity-0 transition-all"></div>
        <svg class="w-5 h-5 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <span class="text-sm font-semibold tracking-wide">Materias</span>
      </a>
    </div>
  </nav>

  <!-- User Section -->
  <div class="p-4 border-t border-slate-800/50 bg-slate-900/30">
    <div class="bg-slate-800/40 rounded-2xl p-4 border border-slate-700/50">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-900/30">
          <span class="text-white text-sm font-black uppercase">
            {{ authService.currentUser()?.sub?.charAt(0) }}
          </span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-black text-white truncate">{{ authService.currentUser()?.sub }}</p>
          <div class="flex items-center gap-1.5 mt-0.5">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Online</p>
          </div>
        </div>
      </div>
      
      <button (click)="logout()"
              class="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white transition-all duration-200 group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span class="text-xs font-bold uppercase tracking-widest">Salir</span>
      </button>
    </div>
  </div>
</div>

<style>
  .active-link {
    background-color: rgb(30 41 59 / 0.8) !important;
    color: white !important;
    box-shadow: inset 0 0 0 1px rgb(51 65 85 / 0.5);
  }
  .active-link .nav-indicator {
    opacity: 1 !important;
    height: 1.5rem !important;
  }
  .active-link svg {
    color: #3b82f6 !important;
  }
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
</style>
