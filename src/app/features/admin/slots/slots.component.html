<div style="max-width: 64rem; margin: 0 auto;">

  <!-- Header -->
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
    <div>
      <h1 style="font-size: 1.5rem; font-weight: 700; color: #0F172A;">Franjas de Atención</h1>
      <p style="font-size: 0.875rem; margin-top: 0.25rem; color: #64748B;">{{ slots().length }} franjas disponibles</p>
    </div>
    <button (click)="openModal()"
            style="display: flex; align-items: center; gap: 0.5rem; background-color: #2563EB; color: white; font-size: 0.875rem; font-weight: 600; padding: 0.625rem 1rem; border-radius: 0.75rem; border: none; cursor: pointer;"
            onmouseover="this.style.backgroundColor='#1D4ED8'"
            onmouseout="this.style.backgroundColor='#2563EB'">
      + Nueva Franja
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading()" style="display: flex; justify-content: center; padding: 4rem 0;">
    <svg style="animation: spin 1s linear infinite; width: 1.5rem; height: 1.5rem; color: #2563EB;" fill="none" viewBox="0 0 24 24">
      <circle style="opacity: 0.25;" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path style="opacity: 0.75;" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
  </div>

  <!-- Listado -->
  <div *ngIf="!loading()" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(20rem, 1fr)); gap: 1.5rem;">
    <div *ngFor="let s of slots()"
         style="background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 1rem; padding: 1.5rem; transition: all 0.2s;"
         onmouseover="this.style.borderColor='#2563EB'; this.style.boxShadow='0 4px 6px -1px rgba(0, 0, 0, 0.1)';"
         onmouseout="this.style.borderColor='#E2E8F0'; this.style.boxShadow='none';">

      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
        <div style="background-color: #EEF2FF; color: #2563EB; padding: 0.5rem; border-radius: 0.75rem;">
          <svg style="width: 1.5rem; height: 1.5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <button (click)="delete(s.id!)"
                [disabled]="deletingId() === s.id"
                style="color: #94A3B8; background: none; border: none; cursor: pointer; padding: 0.25rem;"
                onmouseover="this.style.color='#DC2626'"
                onmouseout="this.style.color='#94A3B8'">
          <svg *ngIf="deletingId() !== s.id" style="width: 1.25rem; height: 1.25rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          <svg *ngIf="deletingId() === s.id" style="animation: spin 1s linear infinite; width: 1.25rem; height: 1.25rem;" fill="none" viewBox="0 0 24 24">
            <circle style="opacity: 0.25;" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path style="opacity: 0.75;" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        </button>
      </div>

      <div style="margin-bottom: 1rem;">
        <p style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748B; margin-bottom: 0.25rem;">Horario</p>
        <p style="font-size: 0.875rem; font-weight: 700; color: #0F172A;">
          {{ formatDate(s.startTime) }} - {{ formatDate(s.endTime) }}
        </p>
      </div>

      <div style="display: flex; gap: 1rem;">
        <div style="flex: 1;">
          <p style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748B; margin-bottom: 0.25rem;">Cupos Totales</p>
          <p style="font-size: 1.125rem; font-weight: 700; color: #0F172A;">{{ s.availableSpots }}</p>
        </div>
        <div style="flex: 1;">
          <p style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748B; margin-bottom: 0.25rem;">Estado</p>
          <span [style.background-color]="s.active ? '#DCFCE7' : '#FEE2E2'"
                [style.color]="s.active ? '#15803D' : '#991B1B'"
                style="padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600;">
            {{ s.active ? 'Activa' : 'Inactiva' }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal nueva franja -->
<div *ngIf="showModal()" style="position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1rem; background-color: rgba(15,23,42,0.4);">
  <div style="background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 1rem; width: 100%; max-width: 28rem; padding: 1.5rem;">

    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
      <h2 style="font-size: 1.125rem; font-weight: 700; color: #0F172A;">Nueva Franja de Atención</h2>
      <button (click)="closeModal()" style="background: none; border: none; cursor: pointer; color: #64748B;">
        <svg style="width: 1.25rem; height: 1.25rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <div>
        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #0F172A; margin-bottom: 0.375rem;">Fecha y Hora Inicio</label>
        <input type="datetime-local" [(ngModel)]="form.startTime"
               style="width: 100%; border: 1px solid #E2E8F0; border-radius: 0.75rem; padding: 0.625rem 1rem; font-size: 0.875rem; color: #0F172A; background-color: #F8FAFC; outline: none; box-sizing: border-box;"/>
      </div>
      <div>
        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #0F172A; margin-bottom: 0.375rem;">Fecha y Hora Fin</label>
        <input type="datetime-local" [(ngModel)]="form.endTime"
               style="width: 100%; border: 1px solid #E2E8F0; border-radius: 0.75rem; padding: 0.625rem 1rem; font-size: 0.875rem; color: #0F172A; background-color: #F8FAFC; outline: none; box-sizing: border-box;"/>
      </div>
      <div>
        <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #0F172A; margin-bottom: 0.375rem;">Cupos disponibles</label>
        <input type="number" [(ngModel)]="form.availableSpots"
               style="width: 100%; border: 1px solid #E2E8F0; border-radius: 0.75rem; padding: 0.625rem 1rem; font-size: 0.875rem; color: #0F172A; background-color: #F8FAFC; outline: none; box-sizing: border-box;"
               min="1"/>
      </div>
    </div>

    <!-- Botones -->
    <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
      <button (click)="closeModal()"
              style="flex: 1; padding: 0.625rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 500; background: #F1F5F9; color: #64748B; border: none; cursor: pointer;">
        Cancelar
      </button>
      <button (click)="save()" [disabled]="saving() || !form.startTime || !form.endTime"
              style="flex: 1; padding: 0.625rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 600; background-color: #2563EB; color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;"
              [style.opacity]="(saving() || !form.startTime || !form.endTime) ? 0.5 : 1"
              onmouseover="this.style.backgroundColor='#1D4ED8'"
              onmouseout="this.style.backgroundColor='#2563EB'">
        <svg *ngIf="saving()" style="animation: spin 1s linear infinite; width: 1rem; height: 1rem;" fill="none" viewBox="0 0 24 24">
          <circle style="opacity: 0.25;" cx="12" cy="12" r="10" stroke="white" stroke-width="4"/>
          <path style="opacity: 0.75;" fill="white" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        {{ saving() ? 'Guardando...' : 'Crear Franja' }}
      </button>
    </div>

  </div>
</div>
