<div class="relative min-h-screen bg-black overflow-hidden flex items-center justify-center p-4">
  <canvas id="meteorCanvas" class="absolute inset-0 z-0"></canvas>

  <div class="relative z-10 w-full max-w-md">
    <div class="bg-zinc-900/80 backdrop-blur-xl border border-zinc-800 rounded-3xl p-8 shadow-2xl">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-white mb-2">Recuperar Contraseña</h2>
        <p class="text-zinc-400">Introduce tu correo para recibir las instrucciones</p>
      </div>

      <div *ngIf="error" class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-500 text-sm animate-shake">
        {{ error }}
      </div>

      <div *ngIf="success" class="mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-emerald-500 text-sm">
        {{ success }}
      </div>

      <form (submit)="onSubmit()" #forgotForm="ngForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Correo Electrónico</label>
          <div class="relative group">
            <input 
              type="email" 
              name="email"
              [(ngModel)]="email"
              required
              email
              class="w-full bg-zinc-950/50 border border-zinc-800 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all group-hover:border-zinc-700"
              placeholder="correo@ejemplo.com"
            >
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="loading || !forgotForm.form.valid"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2"
        >
          <span *ngIf="loading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          {{ loading ? 'Enviando...' : 'Enviar instrucciones' }}
        </button>
      </form>

      <div class="mt-8 text-center">
        <a routerLink="/login" class="text-zinc-500 hover:text-white text-sm transition-colors">
          Volver al inicio de sesión
        </a>
      </div>
    </div>
  </div>
</div>
