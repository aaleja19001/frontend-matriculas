<div class="relative min-h-screen bg-black overflow-hidden flex items-center justify-center p-4">
  <canvas id="meteorCanvas" class="absolute inset-0 z-0"></canvas>

  <div class="relative z-10 w-full max-w-md">
    <div class="bg-zinc-900/80 backdrop-blur-xl border border-zinc-800 rounded-3xl p-8 shadow-2xl">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-white mb-2">Nueva Contraseña</h2>
        <p class="text-zinc-400">Establece tu nueva contraseña de acceso</p>
      </div>

      <div *ngIf="error" class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-500 text-sm">
        {{ error }}
      </div>

      <div *ngIf="success" class="mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-emerald-500 text-sm">
        {{ success }}
      </div>

      <form *ngIf="key && !success" (submit)="onSubmit()" #resetForm="ngForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Nueva Contraseña</label>
          <div class="relative group">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              name="newPassword"
              [(ngModel)]="newPassword"
              required
              minlength="8"
              maxlength="15"
              class="w-full bg-zinc-950/50 border border-zinc-800 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all group-hover:border-zinc-700"
              placeholder="••••••••"
            >
            <button 
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white transition-colors"
            >
              <span class="material-icons-outlined text-xl">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Confirmar Contraseña</label>
          <div class="relative group">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              required
              class="w-full bg-zinc-950/50 border border-zinc-800 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all group-hover:border-zinc-700"
              placeholder="••••••••"
            >
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="loading || !resetForm.form.valid"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2"
        >
          <span *ngIf="loading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          {{ loading ? 'Actualizando...' : 'Actualizar contraseña' }}
        </button>
      </form>

      <div class="mt-8 text-center">
        <a routerLink="/login" class="text-zinc-500 hover:text-white text-sm transition-colors">
          Volver al inicio de sesión
        </a>
      </div>
    </div>
  </div>
</div>
